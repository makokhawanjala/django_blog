<form method="post" action="{% url 'blog:post_comment' post.id %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" style="font-size:0.85rem; font-weight:600; color:#374151; margin-bottom:0.3rem; display:block;">Name</label>
        <input type="text" name="{{ form.name.html_name }}" id="{{ form.name.id_for_label }}" class="form-control" placeholder="Your name" value="{{ form.name.value|default:'' }}">
        {% if form.name.errors %}<div style="color:#dc2626; font-size:0.8rem; margin-top:0.25rem;">{{ form.name.errors|join:", " }}</div>{% endif %}
    </div>
    <div class="mb-3">
        <label for="{{ form.email.id_for_label }}" style="font-size:0.85rem; font-weight:600; color:#374151; margin-bottom:0.3rem; display:block;">Email</label>
        <input type="email" name="{{ form.email.html_name }}" id="{{ form.email.id_for_label }}" class="form-control" placeholder="your@email.com" value="{{ form.email.value|default:'' }}">
        {% if form.email.errors %}<div style="color:#dc2626; font-size:0.8rem; margin-top:0.25rem;">{{ form.email.errors|join:", " }}</div>{% endif %}
    </div>
    <div class="mb-3">
        <label for="{{ form.body.id_for_label }}" style="font-size:0.85rem; font-weight:600; color:#374151; margin-bottom:0.3rem; display:block;">Comment</label>
        <textarea name="{{ form.body.html_name }}" id="{{ form.body.id_for_label }}" class="form-control" rows="5" placeholder="Share your thoughts…">{{ form.body.value|default:'' }}</textarea>
        {% if form.body.errors %}<div style="color:#dc2626; font-size:0.8rem; margin-top:0.25rem;">{{ form.body.errors|join:", " }}</div>{% endif %}
    </div>
    <button type="submit" class="btn-submit-comment">
        <i class="bi bi-send-fill me-1"></i> Submit Comment
    </button>
</form>
